{% extends "base.html" %}

{% block content %}

<a href="/criar" class="btn">+ Novo Usuário</a>

<table>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Email</th>
    </tr>

    {% for u in usuarios %}
    <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.email }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
